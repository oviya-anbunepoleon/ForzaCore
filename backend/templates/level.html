{% extends "base.html" %}
{% block content %}

<div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl p-10">

    <h2 class="text-3xl font-bold text-indigo-600 mb-6 text-center">
        {{ role }} - Level {{ level }}
    </h2>

    <form method="post" action="/level-submit" class="space-y-8">

        <input type="hidden" name="role" value="{{ role }}">
        <input type="hidden" name="level" value="{{ level }}">

        {% for q in questions %}

        <div class="bg-gray-50 p-6 rounded-xl shadow-sm">
            <p class="font-semibold mb-4">
                {{ loop.index }}. {{ q.question }}
            </p>

            <div class="space-y-2">
                <label class="block">
                    <input type="radio" name="q{{ loop.index }}" value="1" required>
                    {{ q.options[0] }}
                </label>

                <label class="block">
                    <input type="radio" name="q{{ loop.index }}" value="2">
                    {{ q.options[1] }}
                </label>
            </div>
        </div>

        {% endfor %}

        <div class="text-center">
            <button type="submit"
                class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition">
                Submit Level
            </button>
        </div>

    </form>

</div>

{% endblock %}
