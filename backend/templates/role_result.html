{% extends "base.html" %}
{% block content %}

<div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-3xl p-12 text-center">

    <h2 class="text-4xl font-extrabold text-indigo-600 mb-8 animate-pulse">
        🚀 AI Career Intelligence Report
    </h2>

    <h3 class="text-5xl font-extrabold text-purple-600 mb-8">
        {{ role }}
    </h3>

    <!-- Confidence Gauge -->
    <div class="flex justify-center mb-14">
        <div class="relative w-44 h-44">
            <svg class="w-44 h-44 transform -rotate-90">
                <circle cx="88" cy="88" r="75"
                    stroke="#e5e7eb"
                    stroke-width="14"
                    fill="transparent"/>
                <circle id="progressCircle"
                    cx="88" cy="88" r="75"
                    stroke="#4f46e5"
                    stroke-width="14"
                    fill="transparent"
                    stroke-linecap="round"
                    stroke-dasharray="471"
                    stroke-dashoffset="471"/>
            </svg>
            <div class="absolute inset-0 flex items-center justify-center text-4xl font-extrabold text-indigo-600">
                {{ confidence }}%
            </div>
        </div>
    </div>

    <!-- Radar Chart -->
    <div class="max-w-xl mx-auto mb-14">
        <canvas id="skillChart"></canvas>
    </div>

    <!-- 🔥 FULL AI REPORT SECTION -->
    <div class="bg-indigo-50 p-8 rounded-2xl shadow-lg mb-12 text-left">

        <h4 class="text-2xl font-bold mb-6 text-indigo-700">
            🤖 AI Career Mentor Analysis
        </h4>

        <div class="whitespace-pre-wrap text-gray-700 leading-relaxed text-sm">
            <div class="bg-indigo-50 p-8 rounded-2xl shadow-lg mb-10 text-left">
    <h4 class="text-xl font-bold mb-4">🧠 AI Insight Engine</h4>
    <div id="aiContent">
        Generating AI Insights...
    </div>
</div>

<script>
fetch("/generate-ai")
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            document.getElementById("aiContent").innerText = data.data;
        } else {
            document.getElementById("aiContent").innerText =
                "AI service temporarily unavailable.";
        }
    })
    .catch(() => {
        document.getElementById("aiContent").innerText =
            "AI service temporarily unavailable.";
    });
</script>
        </div>

    </div>

    <!-- Start Level -->
    <div>
        <a href="/level?role={{ role }}&level=1"
           class="bg-indigo-600 text-white px-10 py-4 rounded-2xl text-lg hover:bg-indigo-700 transition">
           🚀 Start Level 1
        </a>
    </div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('skillChart');

new Chart(ctx, {
    type: 'radar',
    data: {
        labels: ['Analytical', 'Communication', 'Creativity', 'Coding', 'Problem Solving'],
        datasets: [{
            label: 'AI Skill Strength',
            data: [
                {{ analytical }},
                {{ communication }},
                {{ creative }},
                {{ coding }},
                {{ problem_solving }}
            ],
            backgroundColor: 'rgba(79, 70, 229, 0.2)',
            borderColor: '#4f46e5',
            borderWidth: 2,
            pointBackgroundColor: '#4f46e5'
        }]
    },
    options: {
        animation: {
            duration: 1500
        },
        scales: {
            r: {
                beginAtZero: true,
                max: 100
            }
        }
    }
});

// Confidence Ring Animation
const circle = document.getElementById("progressCircle");
const radius = 75;
const circumference = 2 * Math.PI * radius;
circle.style.strokeDasharray = circumference;

const confidenceValue = {{ confidence }};
const offset = circumference - (confidenceValue / 100) * circumference;

setTimeout(() => {
    circle.style.transition = "stroke-dashoffset 1.5s ease";
    circle.style.strokeDashoffset = offset;
}, 300);

</script>

{% endblock %}
