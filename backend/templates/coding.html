{% extends "base.html" %}
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 flex items-center justify-center py-12 px-6">

    <div class="w-full max-w-4xl bg-white shadow-2xl rounded-3xl p-10 transition-all duration-500 hover:shadow-indigo-200">

        <!-- Header -->
        <div class="mb-8 text-center">
            <h2 class="text-4xl font-extrabold text-indigo-600 tracking-wide">
                💻 Technical Coding Evaluation
            </h2>
            <p class="text-gray-500 mt-2">
                Demonstrate your logical thinking and structured problem-solving ability.
            </p>
        </div>

        <!-- XP Badge -->
        <div class="flex justify-center mb-6">
            <div class="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-full text-sm font-semibold shadow-sm">
                🔥 This round impacts your final role assignment
            </div>
        </div>

        <form action="/coding-result" method="post" class="space-y-8">

            <!-- Coding Question -->
            <div>
                <label class="block text-lg font-semibold text-gray-700 mb-3">
                    🧠 Problem Solving Question
                </label>
                <textarea 
                    name="text_answer"
                    rows="8"
                    required
                    placeholder="Explain your approach clearly. Write structured logic..."
                    class="w-full p-5 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-indigo-400 focus:outline-none transition font-mono text-sm shadow-sm resize-none"
                ></textarea>
            </div>

            <!-- MCQ Section -->
            <div>
                <label class="block text-lg font-semibold text-gray-700 mb-4">
                    📌 Conceptual Question
                </label>

                <div class="space-y-3">

                    <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-indigo-50 transition">
                        <input type="radio" name="mcq_answer" value="1" required class="accent-indigo-600 w-4 h-4">
                        <span class="text-gray-700">Efficient algorithm reduces time complexity</span>
                    </label>

                    <label class="flex items-center gap-3 p-4 border rounded-xl cursor-pointer hover:bg-indigo-50 transition">
                        <input type="radio" name="mcq_answer" value="2" required class="accent-indigo-600 w-4 h-4">
                        <span class="text-gray-700">More loops always improve performance</span>
                    </label>

                </div>
            </div>

            <!-- Submit Button -->
            <div class="text-center pt-6">
                <button 
                    type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-3 rounded-full text-lg font-semibold shadow-lg transition transform hover:scale-105 duration-300">
                    🚀 Submit & Continue
                </button>
            </div>

        </form>

        <!-- Elegant Footer Line -->
        <div class="mt-10 border-t pt-6 text-center text-sm text-gray-400">
            CareerForge AI • Smart Role Intelligence System
        </div>

    </div>

</div>

{% endblock %}
