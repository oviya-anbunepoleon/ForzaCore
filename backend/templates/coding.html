{% extends "base.html" %}
{% block content %}

<div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-3xl p-12">

    <h2 class="text-4xl font-extrabold text-indigo-600 mb-6 text-center">
        💻 Technical Coding Evaluation
    </h2>

    <p class="text-gray-600 text-center mb-8">
        Demonstrate your logical thinking and structured problem-solving ability.
    </p>

    <!-- Coding Question -->
    <div class="bg-indigo-50 p-6 rounded-xl mb-8">
        <h3 class="font-bold text-lg mb-3">🧠 Problem Solving Question</h3>
        <p class="whitespace-pre-line">
            {{ coding_question }}
        </p>
    </div>

    <!-- FORM -->
    <form method="POST" action="/coding-result" class="space-y-8">

        <!-- Text Answer -->
        <div>
            <label class="block font-semibold mb-2">
                ✍️ Explain Your Approach
            </label>
            <textarea name="text_answer"
                      required
                      rows="6"
                      class="w-full border border-gray-300 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                      placeholder="Write structured logic..."></textarea>
        </div>

        <!-- MCQ -->
        <div>
            <label class="block font-semibold mb-3">
                📌 Conceptual Question
            </label>

            <div class="space-y-3">
                <label class="flex items-center space-x-3">
                    <input type="radio" name="mcq_answer" value="1" required>
                    <span>Efficient algorithm reduces time complexity</span>
                </label>

                <label class="flex items-center space-x-3">
                    <input type="radio" name="mcq_answer" value="2">
                    <span>More loops always improve performance</span>
                </label>
            </div>
        </div>

        <!-- Submit -->
        <div class="text-center">
            <button type="submit"
                    class="bg-indigo-600 text-white px-8 py-3 rounded-xl hover:bg-indigo-700 transition">
                🚀 Submit & Continue
            </button>
        </div>

    </form>

</div>

{% endblock %}
