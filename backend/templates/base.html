<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CareerForge AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }

        .dark body {
            background: #0f172a;
        }

        .dark .sidebar {
            background: rgba(30, 41, 59, 0.8);
        }

        .dark nav {
            background: #1e293b !important;
        }

        /* 🌸 Pink Snow Canvas */
        #pinkSnow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
        }
    </style>

    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

</head>

<body class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 min-h-screen flex transition-all duration-500">

    <!-- 🌸 Pink Snow -->
    <canvas id="pinkSnow"></canvas>

    <!-- SIDEBAR -->
    <aside class="sidebar w-64 bg-white/60 backdrop-blur-xl shadow-xl border-r border-white/30 p-6 flex flex-col justify-between transition-all duration-500">

        <div>
            <h1 class="text-2xl font-extrabold text-indigo-600 mb-10">
                CareerForge AI
            </h1>

            <nav class="space-y-3">

                <a href="/dashboard"
                   class="block px-4 py-3 rounded-xl hover:bg-indigo-100 transition font-medium">
                   🏠 Dashboard
                </a>

                <a href="/assessment"
                   class="block px-4 py-3 rounded-xl hover:bg-indigo-100 transition font-medium">
                   🧠 Career Assessment
                </a>

                <a href="/codelab"
                   class="block px-4 py-3 rounded-xl hover:bg-indigo-100 transition font-medium">
                   💻 CodeLab
                </a>

                <a href="/speaklab"
                   class="block px-4 py-3 rounded-xl hover:bg-indigo-100 transition font-medium">
                   🗣 SpeakLab
                </a>

            </nav>
        </div>

        <button onclick="toggleDarkMode()"
                class="mt-10 bg-gray-800 text-white py-2 rounded-xl hover:bg-black transition">
            🌙 Toggle Theme
        </button>

    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col">

        <nav class="bg-white/70 backdrop-blur-md shadow-md px-8 py-4 transition-all duration-500">
            <div class="flex justify-end">
                <a href="/" class="text-gray-600 hover:text-indigo-600 font-medium">
                    Logout
                </a>
            </div>
        </nav>

        <main class="flex-1 p-12 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>

    </div>

    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle("dark");

            if (html.classList.contains("dark")) {
                localStorage.setItem("theme", "dark");
            } else {
                localStorage.setItem("theme", "light");
            }
        }

        /* 🌸 Pink Snow Animation */
        const canvas = document.getElementById("pinkSnow");
        const ctx = canvas.getContext("2d");

        let particles = [];
        const particleCount = 80;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 3 + 1,
                    speed: Math.random() * 1 + 0.5,
                    opacity: Math.random() * 0.6 + 0.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 105, 180, ${p.opacity})`;
                ctx.fill();

                p.y += p.speed;

                if (p.y > canvas.height) {
                    p.y = 0;
                    p.x = Math.random() * canvas.width;
                }
            }

            requestAnimationFrame(drawParticles);
        }

        resizeCanvas();
        createParticles();
        drawParticles();

        window.addEventListener("resize", () => {
            resizeCanvas();
            createParticles();
        });
    </script>

</body>
</html>
