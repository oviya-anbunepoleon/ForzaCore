{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto bg-white shadow-xl rounded-2xl p-8">

    <h2 class="text-3xl font-bold text-center text-indigo-600 mb-6">
        Create Account
    </h2>

    <form action="/register" method="post" class="space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700">Username</label>
            <input type="text" name="username" required
                   class="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" name="password" required
                   class="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition font-semibold">
            Register
        </button>

    </form>
</div>

{% endblock %}
