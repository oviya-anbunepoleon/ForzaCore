{% extends "base.html" %}
{% block content %}

<div class="max-w-3xl mx-auto bg-white shadow-2xl rounded-2xl p-10 text-center">

    <h2 class="text-3xl font-bold text-indigo-600 mb-8">
        🎯 Your Career Assessment Report
    </h2>

    <!-- Role -->
    <div class="mb-6">
        <p class="text-gray-500 text-sm uppercase tracking-wide">
            Recommended Role
        </p>
        <p class="text-2xl font-extrabold text-gray-800 mt-2">
            {{ role }}
        </p>
    </div>

    <!-- Level + XP -->
    <div class="grid grid-cols-2 gap-6 mb-8">

        <div class="bg-indigo-50 rounded-xl p-5">
            <p class="text-gray-500 text-sm">Level</p>
            <p class="text-2xl font-bold text-indigo-600 mt-2">
                {{ level }}
            </p>
        </div>

        <div class="bg-green-50 rounded-xl p-5">
            <p class="text-gray-500 text-sm">XP Earned</p>
            <p class="text-2xl font-bold text-green-600 mt-2">
                {{ xp }}
            </p>
        </div>

    </div>

    <!-- Readiness Bar -->
    <div class="mb-8">
        <p class="text-gray-600 font-medium mb-2">
            Readiness Score: {{ readiness }}%
        </p>

        <div class="w-full bg-gray-200 rounded-full h-4">
            <div class="bg-indigo-600 h-4 rounded-full transition-all duration-500"
                 style="width: {{ readiness }}%;">
            </div>
        </div>
    </div>

    <!-- AI Feedback -->
    <div class="bg-gray-50 rounded-xl p-6 mb-8">
        <h3 class="text-xl font-bold text-gray-800 mb-3">
            🤖 AI Feedback
        </h3>
        <p class="text-gray-600 leading-relaxed">
            {{ feedback }}
        </p>
    </div>

    <!-- Download Button -->
    <div>
        <a href="/download"
           class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition font-semibold">
            Download Full PDF Report
        </a>
    </div>

</div>

{% endblock %}
